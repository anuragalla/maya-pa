services:
  # --- Frontend: React chat UI served via nginx ---
  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      agent:
        condition: service_healthy
    ports:
      - "3000:3000"

  # --- Backend: FastAPI + ADK agent ---
  agent:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for auto-reload in dev
      - ./server/src:/app/src
      # Mount GCP Application Default Credentials so Vertex AI works
      - ${HOME}/.config/gcloud/application_default_credentials.json:/home/app/.config/gcloud/application_default_credentials.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/home/app/.config/gcloud/application_default_credentials.json
    command: ["uvicorn", "live150.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/src"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- Scheduler: APScheduler for reminders ---
  scheduler:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/home/app/.config/gcloud/application_default_credentials.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/home/app/.config/gcloud/application_default_credentials.json
    command: ["python", "-m", "live150.reminders.run_scheduler"]

  # --- Database: Postgres + pgvector ---
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: live150
      POSTGRES_USER: live150
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-live150dev}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./server/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U live150 -d live150"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Migrator: runs Alembic then exits ---
  migrator:
    build: ./server
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    restart: "no"

volumes:
  pgdata:
